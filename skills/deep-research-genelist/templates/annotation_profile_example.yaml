# Example annotation profile — Acanthochitona crinata chiton scRNAseq atlas
# Each dataset gets its own profile with its own annotation sources.
# Generated by the deep-research-genelist skill during interactive setup.
# Saved to: outs/deep_research/annotation_profile.yaml

dataset: "larval whole-body scRNAseq atlas (10X Genomics Chromium)"
organism: "*Acanthochitona crinata*"
common_name: "chiton"
date_created: "2026-03-06"
confirmed_by_user: true

sources:
  # --- Tier 4: Manual curation ---
  - method: "manual"
    tier: "manual"
    name_format: "clean gene symbols, same format as orthology names"
    distinguishing_feature: "cannot be distinguished from orthology names by format alone"
    examples: []
    notes: "Small number of hand-verified names for well-known genes"

  # --- Tier 1: Orthology ---
  # NOTE: In display_name, single gene symbols from eggNOG and phylome look
  # identical (e.g., "Cebpb"). Both are Tier 1 orthology — treated equivalently.

  - method: "custom_phylome"
    tier: "orthology"
    name_format: >
      Clean gene symbol (e.g., Msx2), or condensed co-ortholog names with
      slash separators (e.g., Cpne5/8/9, Creb3/Creb3l3/Creb3l4). May have
      Dm- prefix for Drosophila orthologs. May end with ... for truncated
      lists (e.g., Bdnf/Ngf/Ntf3...).
    distinguishing_feature: >
      Slash-separated multi-gene names WITHOUT * suffix; Dm- prefix names;
      ... truncation. Single gene symbols overlap with eggNOG format.
    examples:
      - "Msx2"
      - "Cpne5/8/9"
      - "Creb3/Creb3l3/Creb3l4"
      - "Dm-cg1672/Spla2"
      - "Bdnf/Ngf/Ntf3..."
      - "Maff/g/k"
    notes: "Custom phylome built for this species. Dm- prefix = Drosophila ortholog."

  - method: "eggnog"
    tier: "orthology"
    name_format: >
      Two formats: (1) Single gene symbol (e.g., Cebpb, Gbp1) — from OGs
      with a representative symbol. (2) Functional description (e.g.,
      "GTPase activity", "metalloendopeptidase activity") — from OGs without
      a gene symbol.
    distinguishing_feature: >
      Format (1) overlaps with phylome single symbols — both Tier 1.
      Format (2) is recognizable as multi-word descriptions, not gene symbols.
    examples:
      # Format 1: symbol
      - "Cebpb"
      - "Gbp1"
      - "Spdef"
      # Format 2: description only
      - "GTPase activity"
      - "neurotransmitter:sodium symporter activity"
      - "AAC-rich mRNA clone AAC4 protein-like"
    notes: >
      eggNOG uses a SINGLE representative name from the OG — shows one
      ortholog rather than the complete co-ortholog set. Description-only
      entries indicate protein family but not a specific gene.

  # --- Tier 2: Homology ---
  - method: "prost"
    tier: "homology"
    name_format: >
      Gene symbols with * (asterisk) suffix. Up to 4 slash-separated genes
      with (+N) overflow. Always ends with *.
    distinguishing_feature: "* suffix on display_name"
    examples:
      - "Hes1*"
      - "Ngf/Il17c/Il17b/Ntf4 (+18)*"
      - "Cldn11/Perp/Cldn7/Cldnd2 (+61)*"
    notes: >
      PROST hits ordered from most to least structurally similar; cut after
      4 genes. Weight earlier names more heavily. Large (+N) values indicate
      a large superfamily where specificity is low.

  # No Tier 3 (BLASTp) sources in this dataset

unannotated:
  format: "bare gene ID"
  examples:
    - "comp292609_c0"
    - "comp154796_c0"
  pattern: "comp\\d+_c\\d+"
  notes: "Trinity gene IDs with no homolog found by any method"
